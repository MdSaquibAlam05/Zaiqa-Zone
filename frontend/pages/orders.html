<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Zaiqa Zone</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .order-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .order-card:hover {
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .status-tracker {
            display: flex;
            justify-content: space-between;
            margin: 1.5rem 0;
            position: relative;
        }
        .status-tracker::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 10%;
            right: 10%;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 0;
        }
        .status-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            text-align: center;
            flex: 1;
        }
        .status-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
            border: 2px solid rgba(255,255,255,0.3);
            font-size: 1rem;
            transition: all 0.3s;
        }
        .status-step.active .status-icon {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(226,55,68,0.5);
        }
        .status-step.completed .status-icon {
            background: var(--success);
            border-color: var(--success);
        }
        .status-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        .status-step.active .status-label,
        .status-step.completed .status-label {
            color: white;
        }
        
        .items-list {
            margin: 1rem 0;
        }
        .item-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .item-image {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" style="text-decoration:none;"><div class="logo">🍽️ ZaiqaZone</div></a>
        <div class="nav-links">
            <a href="/"><button class="btn btn-outline">🏠 Home</button></a>
            <button class="btn btn-danger" onclick="logout()">🚪 Logout</button>
        </div>
    </nav>

    <div class="container" style="padding-top:2rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h1 style="font-size:2rem;">📋 My Orders</h1>
            <button class="btn btn-outline" onclick="refreshOrders()">🔄 Refresh</button>
        </div>
        
        <div id="ordersContainer">
            <p style="text-align:center; color:var(--text-muted); padding:3rem;">Loading orders... 🍽️</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const API = 'http://localhost:5000/api';
    const user = JSON.parse(localStorage.getItem('zaiqa_user'));

    if (!user) {
      window.location.href = '/login';
    }

    // ===== FETCH ORDERS =====
    async function fetchOrders() {
      try {
        const res = await fetch(`${API}/orders/myorders`, {
          headers: { 'Authorization': `Bearer ${user.token}` }
        });
        const orders = await res.json();
        renderOrders(orders);
      } catch (err) {
        document.getElementById('ordersContainer').innerHTML = 
          '<p style="text-align:center;color:var(--text-muted);padding:3rem;">❌ Failed to load orders. Server running?</p>';
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');
      
      if (orders.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding:3rem;">
            <p style="font-size:3rem;">🛒</p>
            <h2>No Orders Yet</h2>
            <p style="color:var(--text-muted);">Start ordering delicious food!</p>
            <a href="/"><button class="btn btn-primary" style="margin-top:1rem;">🍕 Browse Menu</button></a>
          </div>`;
        return;
      }

      container.innerHTML = orders.map(order => {
        const statuses = ['placed', 'confirmed', 'preparing', 'out_for_delivery', 'delivered'];
        const currentIndex = statuses.indexOf(order.status);
        
        return `
          <div class="order-card">
            <div class="order-header">
              <div>
                <strong style="font-size:1.1rem;">Order #${order._id?.slice(-8).toUpperCase()}</strong>
                <p style="color:var(--text-muted); font-size:0.85rem;">${new Date(order.createdAt).toLocaleString()}</p>
              </div>
              <span style="background:${order.status === 'delivered' ? 'var(--success)' : 'var(--primary)'}; padding:0.4rem 1.2rem; border-radius:50px; font-size:0.85rem; font-weight:600;">
                ${order.status.replace('_', ' ').toUpperCase()}
              </span>
            </div>

            <!-- STATUS TRACKER -->
            <div class="status-tracker">
              ${statuses.map((status, index) => `
                <div class="status-step ${index === currentIndex ? 'active' : ''} ${index < currentIndex ? 'completed' : ''}">
                  <div class="status-icon">
                    ${index < currentIndex ? '✅' : index === currentIndex ? '📍' : '⭕'}
                  </div>
                  <span class="status-label">${status.replace('_', ' ')}</span>
                </div>
              `).join('')}
            </div>

            <!-- ORDER ITEMS -->
            <div class="items-list">
              ${order.items?.map(item => `
                <div class="item-row">
                  <img src="${item.image}" alt="${item.name}" class="item-image" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100'">
                  <div style="flex:1;">
                    <strong>${item.name}</strong>
                    <p style="color:var(--text-muted); font-size:0.85rem;">₹${item.price} × ${item.quantity}</p>
                  </div>
                  <strong style="color:var(--gold);">₹${item.price * item.quantity}</strong>
                </div>
              `).join('')}
            </div>

            <!-- ORDER FOOTER -->
            <div style="display:flex; justify-content:space-between; align-items:center; padding-top:1rem; border-top:1px solid rgba(255,255,255,0.1); margin-top:1rem;">
              <span style="font-size:1.2rem;">Total: <strong style="color:var(--gold);">₹${order.totalAmount}</strong></span>
              <span style="color:var(--text-muted); font-size:0.85rem;">Payment: ${order.paymentMethod?.toUpperCase() || 'COD'}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function refreshOrders() {
      document.getElementById('ordersContainer').innerHTML = '<p style="text-align:center; padding:3rem;">Loading...</p>';
      fetchOrders();
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 2500);
    }

    function logout() {
      localStorage.removeItem('zaiqa_user');
      window.location.href = '/';
    }

    // Auto refresh every 30 seconds
    fetchOrders();
    setInterval(fetchOrders, 30000);
    </script>
</body>
</html>
