<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Zaiqa Zone</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="form-container">
        <h2>✨ Create Account</h2>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-input" id="name" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-input" id="email" placeholder="you@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-input" id="password" placeholder="Min 6 characters">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="signup()">Sign Up</button>
        <p style="text-align:center; margin-top:1rem;">
            Already have an account? <a href="/login" style="color:var(--primary);">Login</a>
        </p>
    </div>
    <div class="toast" id="toast"></div>

    <script>
    const API = 'http://localhost:5000/api';

    async function signup() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!name || !email || !password) return showToast('Fill all fields!');
        if (password.length < 6) return showToast('Password must be 6+ characters!');
        
        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            
            if (res.ok) {
                localStorage.setItem('zaiqa_user', JSON.stringify(data));
                showToast(`Welcome to Zaiqa Zone, ${data.name}! 🎉`);
                setTimeout(() => window.location.href = '/', 1000);
            } else {
                showToast(data.message || 'Signup failed');
            }
        } catch (err) {
            showToast('Server error! Run: npm run dev');
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    </script>
</body>
</html>
